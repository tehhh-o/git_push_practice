name: Github CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  compile_app:
    runs-on: ubuntu-latest

    steps:
      - name: Starting build process
        run: echo "Starting build process..."

      - name: Running additonal verification
        run: echo "Running additonal verification..."

      - name: Build success
        run: echo "Project is building successfully!"

  test_job:
    runs-on: ubuntu-latest
    needs: compile_app

    steps:
      - name: Running tests
        run: echo "Running tests..."

      - name: Test success
        run: echo "Tests completed successfully!"